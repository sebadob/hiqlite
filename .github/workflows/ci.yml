name: CI

# Mirrors the local `just verify` flow so CI and local checks cannot drift:
# the justfile stays the single source of truth and each job simply runs a recipe.
#   lint  -> just clippy + just clippy-examples
#   check -> just check        (cargo clippy -- -D warnings + cargo minimal-versions check)
#   test  -> just test         (nightly + --cfg tokio_unstable, the tests/cluster suite)
#   msrv  -> just msrv-verify   (cargo msrv verify per crate, against the declared rust-version)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The justfile recipes start with `clear`, which exits non-zero when TERM is
  # unset (as it is on CI runners) and would abort the recipe under `set -e`.
  TERM: xterm

jobs:
  lint:
    name: clippy (feature matrix) + examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: just
      - run: just clippy
      - run: just clippy-examples

  check:
    name: clippy -D warnings + minimal-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Install nightly first so stable becomes the default toolchain; the
      # minimal-versions step invokes `+nightly` only for the -Z lockfile pass.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned
        with:
          toolchain: nightly
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: just,cargo-hack,cargo-minimal-versions
      - run: just check

  test:
    name: tests (nightly, tokio_unstable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: just
      - run: just test

  msrv:
    name: MSRV verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # cargo-msrv installs and pins the declared rust-version toolchain itself.
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: just,cargo-msrv
      - run: just msrv-verify
