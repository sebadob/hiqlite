name: Code Style

# Single job, no third-party actions or images: runs inside the maintainer's
# rauthy-builder container (which ships `just`, the Rust toolchain, clippy and
# cc) and only uses the first-party actions/checkout. Steps run sequentially in
# one job so the workspace is compiled once.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  CARGO_TERM_COLOR: always
  # hiqlite's justfile recipes start with `clear`, which exits non-zero when
  # TERM is unset (as it is on a runner) and would abort the recipe under `set -e`.
  TERM: xterm

jobs:
  check:
    if: github.event.pull_request.draft == false
    name: Check Code Style
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sebadob/rauthy-builder:20260519
    steps:
      - uses: actions/checkout@v4
      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings
      - name: Clippy (feature matrix)
        run: just clippy
      - name: Clippy (examples)
        run: just clippy-examples
