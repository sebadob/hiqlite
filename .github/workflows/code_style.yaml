name: Check

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  CARGO_TERM_COLOR: always
  # `clear` in the just recipes fails without TERM on CI runners
  TERM: xterm

jobs:
  check:
    if: github.event.pull_request.draft == false
    name: Check
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sebadob/rauthy-builder:20260519
    steps:
      - uses: actions/checkout@v4
      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings
      - name: Clippy (feature matrix)
        run: just clippy
      - name: Clippy (examples)
        run: just clippy-examples
      - name: Tests
        # S3 tests cannot be done inside GitHub CI
        run: just test-no-s3
